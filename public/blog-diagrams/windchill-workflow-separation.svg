<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" fill="#F8F7F3"/>
  <text x="80" y="78" fill="#14213D" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Windchill Workflow Responsibility Split</text>
  <text x="80" y="114" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">Keep workflow model thin, move business behavior into Java helpers and services</text>

  <rect x="90" y="170" width="310" height="380" rx="24" fill="#FFF8E8" stroke="#E9C46A" stroke-width="3"/>
  <text x="245" y="216" text-anchor="middle" fill="#7C5C00" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Workflow Model</text>
  <rect x="128" y="250" width="234" height="66" rx="14" fill="#E9C46A"/>
  <text x="245" y="291" text-anchor="middle" fill="#3B2F00" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Approval Node</text>
  <rect x="128" y="340" width="234" height="66" rx="14" fill="#F4A261"/>
  <text x="245" y="381" text-anchor="middle" fill="#3B240C" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Robot Node</text>
  <rect x="128" y="430" width="234" height="78" rx="14" fill="#FAEDCD"/>
  <text x="245" y="466" text-anchor="middle" fill="#6B4F16" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Expression</text>
  <text x="245" y="494" text-anchor="middle" fill="#6B4F16" font-family="Arial, Helvetica, sans-serif" font-size="16">WorkflowHelper.sendToOA</text>

  <rect x="470" y="170" width="300" height="380" rx="24" fill="#EDF6F9" stroke="#2A9D8F" stroke-width="3"/>
  <text x="620" y="216" text-anchor="middle" fill="#125B55" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Java Helper Layer</text>
  <rect x="510" y="252" width="220" height="72" rx="14" fill="#2A9D8F"/>
  <text x="620" y="295" text-anchor="middle" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">WorkflowHelper</text>
  <rect x="510" y="352" width="220" height="72" rx="14" fill="#52B788"/>
  <text x="620" y="395" text-anchor="middle" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Validation</text>
  <rect x="510" y="452" width="220" height="72" rx="14" fill="#40916C"/>
  <text x="620" y="495" text-anchor="middle" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">WTException</text>

  <rect x="840" y="170" width="270" height="380" rx="24" fill="#F1F5F9" stroke="#577590" stroke-width="3"/>
  <text x="975" y="216" text-anchor="middle" fill="#274C77" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Service / Client</text>
  <rect x="878" y="252" width="194" height="72" rx="14" fill="#577590"/>
  <text x="975" y="295" text-anchor="middle" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Business Service</text>
  <rect x="878" y="352" width="194" height="72" rx="14" fill="#4D908E"/>
  <text x="975" y="395" text-anchor="middle" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">OA / ERP Client</text>
  <rect x="878" y="452" width="194" height="72" rx="14" fill="#277DA1"/>
  <text x="975" y="495" text-anchor="middle" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Audit / Logs</text>

  <path d="M400 372H470" stroke="#0F172A" stroke-width="5" stroke-linecap="round"/>
  <path d="M770 372H840" stroke="#0F172A" stroke-width="5" stroke-linecap="round"/>
  <polygon points="458,364 470,372 458,380" fill="#0F172A"/>
  <polygon points="828,364 840,372 828,380" fill="#0F172A"/>

  <rect x="92" y="600" width="1018" height="74" rx="18" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="125" y="642" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="20">Recommended practice: workflow handles routing, Java handles behavior, and failures are surfaced via <tspan font-weight="700">WTException</tspan>.</text>
</svg>
